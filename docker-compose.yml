services:
  nginx:
    image: nginx:alpine
    ports:
      - "9999:9999"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api-1
      - api-2
    deploy:
      resources:
        limits:
          cpus: "0.1"
          memory: "10MB"

  api-1:
    image: eduardodandolini/rinha-backend-2026:latest
    deploy:
      resources:
        limits:
          cpus: "0.45"
          memory: "165MB"

  api-2:
    image: eduardodandolini/rinha-backend-2026:latest
    deploy:
      resources:
        limits:
          cpus: "0.45"
          memory: "165MB"
